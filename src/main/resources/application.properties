# ===================================================================
# CONFIGURAÇÃO DO BANCO DE DADOS (MySQL na Porta 3307 sem senha)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3307/controlfit?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURAÇÃO DO HIBERNATE / JPA
# ===================================================================
# O 'update' faz o Hibernate criar as tabelas automaticamente se elas não existirem
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===================================================================
# CONFIGURAÇÃO DO SERVIDOR (Porta padrão do Spring Boot)
# ===================================================================
server.port=8085

# ===================================================================
# CONFIGURAÇÃO DO THYMELEAF (Para carregar suas telas HTML)
# ===================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html