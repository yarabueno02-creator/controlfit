<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ControlFit - Gerenciamento de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-lightning-charge-fill text-warning me-2"></i>ControlFit</span>
            <div class="d-flex">
                <a href="/products" class="btn btn-light me-2">Produtos</a>
                <a href="/customers" class="btn btn-outline-light">Clientes</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-box-seam-fill me-2 text-success"></i>Produtos em Estoque</h2>
            <a href="/products/new" class="btn btn-success"><i class="bi bi-plus-circle-fill me-2"></i>Novo Produto</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Status</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="7" class="text-center py-4 text-muted">
                                <i class="bi bi-emoji-neutral d-block fs-2 mb-2"></i>
                                Nenhum produto cadastrado ainda.
                            </td>
                        </tr>
                        <tr th:each="p : ${products}">
                            <td th:text="${p.id}">1</td>
                            <td th:text="${p.name}" class="fw-bold">Nome do Produto</td>
                            <td th:text="${p.category}">Categoria</td>
                            <td th:text="${'R$ ' + p.price}">R$ 0.00</td>
                            <td th:text="${p.stock}">0</td>
                            <td>
                                <span th:text="${p.status}" 
                                      th:classappend="${p.status.name() == 'NORMAL' ? 'bg-success' : (p.status.name() == 'LOW' ? 'bg-warning text-dark' : 'bg-danger')}"
                                      class="badge">NORMAL</span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-outline-warning me-1">
                                    <i class="bi bi-pencil-fill"></i>
                                </a>
                                <a th:href="@{/products/delete/{id}(id=${p.id})}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Tem certeza que deseja excluir este produto?');">
                                    <i class="bi bi-trash-fill"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
