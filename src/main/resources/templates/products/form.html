<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ControlFit - Formulário de Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-lightning-charge-fill text-warning me-2"></i>ControlFit</span>
            <div class="d-flex">
                <a href="/products" class="btn btn-light me-2">Produtos</a>
                <a href="/customers" class="btn btn-outline-light">Clientes</a>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white py-3">
                <h4 class="card-title mb-0">
                    <i class="bi bi-box-seam me-2"></i>
                    <span th:text="${product.id != null} ? 'Editar Produto' : 'Novo Produto'">Novo Produto</span>
                </h4>
            </div>
            <div class="card-body p-4">
                
                <form th:action="@{/products/save}" th:object="${product}" method="POST">
                    
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Nome do Produto</label>
                        <input type="text" th:field="*{name}" class="form-control" id="name" required placeholder="Ex: Creatina 300g">
                    </div>

                    <div class="mb-3">
                        <label for="category" class="form-label fw-bold">Categoria</label>
                        <input type="text" th:field="*{category}" class="form-control" id="category" required placeholder="Ex: Suplementos, Acessórios">
                    </div>

                    <div class="mb-3">
                        <label for="price" class="form-label fw-bold">Preço de Venda (R$)</label>
                        <input type="number" step="0.01" th:field="*{price}" class="form-control" id="price" required placeholder="0.00">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="stock" class="form-label fw-bold">Qtd em Estoque</label>
                            <input type="number" th:field="*{stock}" class="form-control" id="stock" required placeholder="0">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="minStock" class="form-label fw-bold">Estoque Mínimo</label>
                            <input type="number" th:field="*{minStock}" class="form-control" id="minStock" required placeholder="0">
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="/products" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle-fill me-2"></i>Salvar Produto
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
